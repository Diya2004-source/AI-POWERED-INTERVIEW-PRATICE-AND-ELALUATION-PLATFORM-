<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0f172a, #111827);
  color: #e5e7eb;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(17, 24, 39, 0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

.header h1 {
  color: #7b2ff7;
  font-size: 22px;
}

.logout-btn {
  background: linear-gradient(90deg, #7b2ff7, #00c6ff);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
}

/* MAIN CONTAINER */
.container {
  width: 65%;
  margin: auto;
  padding-top: 40px;
}

/* SECTION CARD */
.section-card {
  background: rgba(17, 24, 39, 0.85);
  padding: 40px;
  border-radius: 18px;
  text-align: center;
  box-shadow: 0 10px 35px rgba(0,0,0,0.5);
  animation: fadeIn 0.3s ease-in-out;
}

/* LEVEL BUTTONS */
.levels {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 25px;
}

.level-btn {
  padding: 12px 28px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.level-btn:hover {
  transform: scale(1.05);
}

.easy { background: #22c55e; color: white; }
.medium { background: #facc15; color: black; }
.hard { background: #ef4444; color: white; }

/* QUIZ BOX */
.quiz-box {
  background: rgba(17, 24, 39, 0.9);
  padding: 30px;
  border-radius: 18px;
  margin-top: 20px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.4);
}

/* QUESTION */
#question {
  font-size: 20px;
  margin: 15px 0;
}

/* TIMER */
.timer {
  font-size: 16px;
  color: #7b2ff7;
  margin-bottom: 10px;
  font-weight: bold;
}

/* OPTIONS */
#options {
  margin-top: 15px;
}

.option-btn {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: #1f2937;
  border: 1px solid #374151;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  transition: 0.2s;
}

.option-btn:hover {
  background: #7b2ff7;
  transform: scale(1.02);
}

/* RESULT CARD (PREMIUM) */
.result-box {
  background: rgba(17, 24, 39, 0.9);
  padding: 40px;
  border-radius: 18px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  animation: fadeIn 0.4s ease-in-out;
}

.result-box h2 {
  color: #7b2ff7;
  margin-bottom: 10px;
}

#score {
  font-size: 20px;
  margin: 15px 0;
  background: rgba(123, 47, 247, 0.15);
  padding: 10px;
  border-radius: 10px;
}

#feedback {
  color: #00c6ff;
  margin-bottom: 15px;
}

/* TIPS */
#tips {
  text-align: left;
  margin-top: 15px;
  padding-left: 18px;
  color: #cbd5e1;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(90deg, #7b2ff7, #00c6ff);
  color: white;
}

/* HIDE */
.hidden {
  display: none;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
  <h1>PrepWise Quiz</h1>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

  <!-- DIFFICULTY -->
  <div id="difficulty-section" class="section-card">
    <h2>Select Difficulty Level</h2>
    <p>Choose your challenge level to begin the quiz</p>

    <div class="levels">
      <button class="level-btn easy" onclick="startQuiz('easy')">Easy</button>
      <button class="level-btn medium" onclick="startQuiz('medium')">Medium</button>
      <button class="level-btn hard" onclick="startQuiz('hard')">Hard</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-section" class="hidden">

    <div class="timer">
      ⏱ Time Left: <span id="timer">15</span>s
    </div>

    <div class="quiz-box">
      <div id="question-count"></div>
      <h2 id="question"></h2>
      <div id="options"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-section" class="hidden">
    <div class="result-box">

      <h2> Result</h2>

      <p id="score"></p>
      <h3 id="feedback"></h3>

      <ul id="tips"></ul>

      <button onclick="goDashboard()">Go Dashboard</button>

    </div>
  </div>

</div>

<script src="../js/quiz.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepWise | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <nav class="navbar navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand fs-3" href="#">PrepWise</a>
        </div>
    </nav>

    <main class="container-fluid d-flex align-items-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-5 d-none d-md-flex align-items-center justify-content-center">
                <div class="bento-grid floating">
                    <div class="bento-item">
                        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=500" alt="Tech">
                    </div>
                    <div class="bento-item bento-tall">
                        <img src="https://images.unsplash.com/photo-1633356122544-f134324a6cee?q=80&w=500" alt="Abstract">
                    </div>
                    <div class="bento-item">
                        <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=500" alt="Networking">
                    </div>
                    <div class="text-white mt-4" style="grid-column: span 2;">
                        <h2 class="fw-bold" style="font-family: 'Syne';">Welcome Back.</h2>
                        <p class="text-muted">Your AI mentor is waiting to start the session.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="glass-card p-5 animate__animated animate__fadeInRight">
                    <h3 class="mb-4 fw-bold text-center">Log In</h3>
                    <div id="login-error" class="alert alert-danger d-none"></div>
                    <form id="loginForm">
                        <input type="email" class="form-control mb-3" id="email" placeholder="Email Address" required>
                        <div class="position-relative mb-4">
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                            <i class="bi bi-eye toggle-icon position-absolute top-50 end-0 translate-middle-y me-3" style="cursor: pointer; color: #8B5CF6;" id="eyeIcon" onclick="togglePassword()"></i>
                        </div>
                        <button type="submit" id="loginBtn" class="btn btn-purple w-100 text-white mb-3">Login</button>
                    </form>
                    
                    <div id="g_id_onload" data-client_id="YOUR_ID" data-callback="handleCredentialResponse"></div>
                    <div class="g_id_signin" data-type="standard" data-width="100%"></div>

                    <p class="text-center mt-4 small text-muted">
                        New here? <a href="registration.html" class="text-white fw-bold text-decoration-none">Create Account</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PrepWise AI. Elevate Your Career.</p>
    </footer>

    <script src="../js/login.js"></script>
</body>
</html>

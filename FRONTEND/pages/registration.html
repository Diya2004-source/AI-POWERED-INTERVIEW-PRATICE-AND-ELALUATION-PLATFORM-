<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* MAIN WRAPPER */
.auth-wrapper {
  display: flex;
  width: 900px;
  height: 520px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* LEFT IMAGE FIX (MOST IMPORTANT) */
.auth-image {
  flex: 1;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* RIGHT FORM */
.auth-form {
  flex: 1;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  padding: 50px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  color: white;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #7b2ff7;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #5a1fcf;
}

p {
  text-align: center;
  margin-top: 15px;
  color: #ccc;
}

a {
  color: #aaa;
}
</style>
</head>

<body>

<div class="auth-wrapper">

  <div class="auth-image"
       style="background-image:url('https://images.unsplash.com/photo-1557804506-669a67965ba0');">
  </div>

  <div class="auth-form">

    <h2>Create Account</h2>

    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="registerBtn">Register</button>

    <p>Already have account? <a href="login.html">Login</a></p>

  </div>

</div>

<script src="../js/api.js"></script>
<script src="../js/registration.js"></script>
</body>
</html>

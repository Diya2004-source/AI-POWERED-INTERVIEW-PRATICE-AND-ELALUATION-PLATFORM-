<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepWise | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

    <nav class="navbar navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand fs-3" href="index.html">PrepWise</a>
        </div>
    </nav>

    <main class="container-fluid d-flex align-items-center py-5">
        <div class="row w-100 justify-content-center align-items-center">
            
            <div class="col-md-5 d-none d-md-flex align-items-center justify-content-center">
                <div class="bento-grid floating">
                    
                    <div class="bento-item bento-tall animate__animated animate__fadeInLeft">
                        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=500" 
                             alt="Neural Network Nodes and Circuits - High Contrast">
                    </div>
                    
                    <div class="bento-item animate__animated animate__fadeInLeft" style="animation-delay: 0.2s;">
                        <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=500" 
                             alt="Professional Code Editor on Mac with Purple Lighting">
                    </div>
                    
                    <div class="bento-item animate__animated animate__fadeInLeft" style="animation-delay: 0.4s;">
                        <img src="https://images.unsplash.com/photo-1620712943543-bcc4638d9f8d?q=80&w=500" 
                             alt="Cyberpunk Aesthetic Humanoid Interface">
                    </div>
                    
                    <div class="text-white mt-4 animate__animated animate__fadeInUp" style="grid-column: span 2; animation-delay: 0.6s;">
                        <h2 class="fw-bold" style="font-family: 'Syne';">Create the Future.</h2>
                        <p class="text-muted">Master interviews with the precision of AI and join the next generation of top-tier developers.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="glass-card p-5 animate__animated animate__fadeInRight">
                    <h3 class="mb-4 fw-bold text-center">Get Started</h3>
                    
                    <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>
                    
                    <form id="registerForm">
                        <div class="floating-group mb-3">
                            <input type="text" class="form-control" id="reg-fullname" placeholder="Full Name" required>
                        </div>
                        <div class="floating-group mb-3">
                            <input type="email" class="form-control" id="reg-email" placeholder="Email Address" required>
                        </div>
                        <div class="floating-group mb-3">
                            <input type="password" class="form-control" id="reg-password" placeholder="Password" required>
                        </div>
                        <div class="floating-group mb-4">
                            <input type="password" class="form-control" id="reg-confirm-password" placeholder="Confirm Password" required>
                        </div>
                        
                        <button type="submit" id="register-btn" class="btn btn-purple w-100 text-white">
                            Verify and Join PrepWise
                        </button>
                    </form>
                    
                    <p class="text-center mt-4 small text-muted">
                        Already have an account? <a href="login.html" class="text-white fw-bold text-decoration-none">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PrepWise AI. Elevate Your Prep. Master Your Goals.</p>
        </div>
    </footer>

    <script src="../js/register.js"></script>
</body>
</html>
